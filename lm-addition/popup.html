<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'Mitr';
      src: url('fonts/Mitr-Regular.ttf') format('truetype');
      font-weight: 400;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 280px;
      background: #252523;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 24px 24px;
      border-radius: 16px;
      overflow: hidden;
    }

    h1 {
      font-family: 'Mitr', sans-serif;
      font-size: 26px;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .status-line {
      font-size: 12px;
      color: #85806f;
      margin-bottom: 4px;
      text-align: center;
    }

    .timing-line {
      font-size: 10px;
      color: #57534a;
      margin-bottom: 32px;
      text-align: center;
    }

    .power-btn-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 28px;
    }

    .power-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid #3a3933;
      transition: border-color 0.5s ease, box-shadow 0.5s ease;
    }

    .power-ring.active {
      border-color: #c7c2bc;
      box-shadow: 0 0 24px rgba(199, 194, 188, 0.3), inset 0 0 12px rgba(199, 194, 188, 0.1);
    }

    .power-glow {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(199, 194, 188, 0.15) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .power-glow.active {
      opacity: 1;
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .power-btn {
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: none;
      background: #1e1e1c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease;
      outline: none;
    }

    .power-btn:hover {
      background: #2d2d2b;
    }

    .power-btn:active {
      transform: scale(0.96);
    }

    .power-btn svg {
      width: 32px;
      height: 32px;
      transition: all 0.4s ease;
    }

    .power-btn svg .icon-path {
      stroke: #57534a;
      transition: stroke 0.4s ease;
    }

    .power-btn.active svg .icon-path {
      stroke: #c7c2bc;
    }

    .state-label {
      font-size: 13px;
      color: #57534a;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.4s ease;
    }

    .state-label.active {
      color: #c7c2bc;
    }
  </style>
</head>
<body>
  <img src="assets/lm-code-white.png" alt="lm-code" style="height:32px; margin-bottom:6px;">
  <div class="status-line" id="presetLine">Пресет: загрузка…</div>
  <div class="timing-line" id="timingLine">—</div>

  <div class="power-btn-wrap">
    <div class="power-glow" id="glow"></div>
    <div class="power-ring" id="ring"></div>
    <button class="power-btn" id="powerBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path class="icon-path" d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
        <line class="icon-path" x1="12" y1="2" x2="12" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="state-label" id="stateLabel">OFF</div>

  <script src="popup.js"></script>
</body>
</html>
