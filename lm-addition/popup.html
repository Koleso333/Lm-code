<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 420px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px 0;
      color: #333;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2196F3;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
    #log-box {
      margin-top: 10px;
      background: #000;
      color: #0f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
      line-height: 1.4;
      max-height: 220px;
      overflow-y: auto;
      padding: 6px 8px;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #log-box div {
      margin-bottom: 2px;
    }
    .log-empty {
      color: #555;
    }
    .inject-row {
      margin-top: 10px;
      display: flex;
      gap: 6px;
    }
    #injectText {
      flex: 1;
      padding: 4px 8px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #injectBtn {
      padding: 4px 10px;
      font-size: 12px;
      background: #2196F3;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #injectBtn:hover {
      background: #1976D2;
    }
  </style>
</head>
<body>
  <h1>lm-addition</h1>
  <div class="toggle-row">
    <span>Сканирование</span>
    <label class="switch">
      <input type="checkbox" id="enabledToggle">
      <span class="slider"></span>
    </label>
  </div>
  <div id="status">Выключено</div>
  <div id="log-box"><div class="log-empty">Нет логов</div></div>
  <div class="inject-row">
    <input type="text" id="injectText" placeholder="Текст для отправки...">
    <button id="injectBtn">Send</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
